# Source registry. Each entry describes one published dataset and how to fetch +
# parse it. Add new sources here; the registry wires them to fetchers/parsers.

sources:
  devon_spending:
    council: devon
    dataset: spending
    fetcher: github_listing
    parser: tabular
    column_map: devon_spending
    threshold_floor: 500
    licence: OGL
    # Devon publishes monthly CSVs in a GitHub repo with stable raw URLs.
    repo: Devon-County-Council/spending
    branch: master
    file_glob: "DCCSpendingOver500_*.csv"

  exeter_spending:
    council: exeter
    dataset: spending
    fetcher: exeter_scrape
    parser: tabular
    column_map: exeter_spending
    threshold_floor: 250
    licence: OGL
    amount_basis: net              # Exeter publishes "Net Amount" (ex-VAT)
    # Exeter hides files behind hashed /media/<hash>/ links; we scrape the page.
    page_url: "https://exeter.gov.uk/council-and-democracy/council-information/council-data/council-spending/"
    # Take CSV only (XLSX is a duplicate of each quarter); exclude the separate
    # procurement/credit-card dataset, which has a different schema.
    file_extensions: [".csv"]
    exclude_pattern: "credit-card"

  # ---- Grants ----
  devon_grants:
    council: devon
    dataset: grants
    fetcher: github_listing
    parser: tabular
    column_map: devon_grants
    licence: OGL
    repo: Devon-County-Council/grants
    branch: master
    file_glob: "*.csv"

  exeter_grants:
    council: exeter
    dataset: grants
    fetcher: exeter_scrape
    parser: tabular
    column_map: exeter_grants
    licence: OGL
    page_url: "https://exeter.gov.uk/council-and-democracy/council-information/council-data/grants-awarded/"
    file_extensions: [".csv"]

  # ---- Contracts ----
  # Devon publishes contracts only via Contracts Finder (OCDS API), not a flat
  # file, so it is deferred. Exeter publishes a downloadable register.
  exeter_contracts:
    council: exeter
    dataset: contracts
    fetcher: exeter_scrape
    parser: tabular
    column_map: exeter_contracts
    licence: OGL
    page_url: "https://exeter.gov.uk/council-and-democracy/council-information/council-data/contracts/"
    file_extensions: [".csv"]
